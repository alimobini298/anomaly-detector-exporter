[general]
prometheus_url   = http://localhost:9090
listen_addr      = 0.0.0.0:9091
lookback_days    = 14
window_minutes   = 30
step_seconds     = 300
z_threshold      = 3.0
interval_seconds = 300
min_samples      = 10
min_delta        = 0.0
min_relative     = 0.0
timezone         = Asia/Tehran

[queries]
# Node Exporter
node_cpu_usage        = 100-(avg by(instance)(rate(node_cpu_seconds_total{mode="idle"}[5m]))*100)
node_memory_usage     = (1-(node_memory_MemAvailable_bytes/node_memory_MemTotal_bytes))*100
node_disk_io          = rate(node_disk_io_time_seconds_total[5m])*100
node_disk_read_bytes  = rate(node_disk_read_bytes_total[5m])
node_disk_write_bytes = rate(node_disk_written_bytes_total[5m])
node_network_rx       = rate(node_network_receive_bytes_total{device!="lo"}[5m])
node_network_tx       = rate(node_network_transmit_bytes_total{device!="lo"}[5m])
node_load1            = node_load1
node_load5            = node_load5
node_open_fds         = node_filefd_allocated

# Nginx — near-zero metrics need min_delta guard
nginx_requests        = rate(nginx_http_requests_total[5m])
nginx_active_conns    = nginx_connections_active
nginx_accepted        = rate(nginx_connections_accepted_total[5m])
nginx_waiting         = nginx_connections_waiting | min_delta=2.0 | z_threshold=4.0
nginx_writing         = nginx_connections_writing | min_delta=2.0 | z_threshold=4.0
nginx_reading         = nginx_connections_reading | min_delta=2.0 | z_threshold=4.0

# MySQL
mysql_queries         = rate(mysql_global_status_queries[5m])
mysql_slow_queries    = rate(mysql_global_status_slow_queries[5m]) | z_threshold=2.5 | min_samples=15
mysql_connections     = mysql_global_status_threads_connected
mysql_aborted         = rate(mysql_global_status_aborted_connects[5m]) | min_delta=0.1
mysql_buffer_pool_pct = (mysql_global_status_innodb_buffer_pool_pages_data/mysql_global_status_innodb_buffer_pool_pages_total)*100
mysql_table_locks     = rate(mysql_global_status_table_locks_waited[5m]) | min_delta=0.01
mysql_bytes_recv      = rate(mysql_global_status_bytes_received[5m])
mysql_bytes_sent      = rate(mysql_global_status_bytes_sent[5m])

# Redis
redis_commands        = rate(redis_commands_processed_total[5m])
redis_memory_pct      = (redis_memory_used_bytes/redis_memory_max_bytes)*100
redis_hit_ratio       = rate(redis_keyspace_hits_total[5m])/(rate(redis_keyspace_hits_total[5m])+rate(redis_keyspace_misses_total[5m]))*100
redis_connected       = redis_connected_clients
redis_blocked         = redis_blocked_clients | min_delta=1.0 | z_threshold=2.0
redis_expired_keys    = rate(redis_expired_keys_total[5m]) | min_delta=0.1
redis_evicted_keys    = rate(redis_evicted_keys_total[5m]) | min_delta=0.01 | z_threshold=2.5
redis_rejected_conns  = rate(redis_rejected_connections_total[5m]) | min_delta=0.01

# PHP-FPM
phpfpm_active         = phpfpm_active_processes
phpfpm_idle           = phpfpm_idle_processes
phpfpm_listen_queue   = phpfpm_listen_queue | min_delta=1.0 | z_threshold=2.5
phpfpm_accepted       = rate(phpfpm_accepted_connections_total[5m])
phpfpm_slow           = rate(phpfpm_slow_requests_total[5m]) | min_delta=0.01 | z_threshold=2.0

# HAProxy
haproxy_req           = rate(haproxy_frontend_http_requests_total[5m])
haproxy_queue         = haproxy_backend_current_queue | min_delta=1.0
haproxy_sessions_pct  = (haproxy_backend_current_sessions/haproxy_backend_limit_sessions)*100
haproxy_errors        = rate(haproxy_backend_connection_errors_total[5m]) | min_delta=0.01
haproxy_5xx           = rate(haproxy_backend_http_responses_total{code="5xx"}[5m]) | min_delta=0.01 | z_threshold=2.5

# Containers / HTTP
container_cpu_pct     = rate(container_cpu_usage_seconds_total{name!=""}[5m])*100
container_mem_pct     = (container_memory_usage_bytes{name!=""}/container_spec_memory_limit_bytes{name!=""})*100
http_requests         = rate(http_requests_total[5m])
http_5xx_pct          = rate(http_requests_total{status=~"5.."}[5m])/rate(http_requests_total[5m])*100 | min_delta=1.0 | z_threshold=2.5
http_latency_p95      = histogram_quantile(0.95,rate(http_request_duration_seconds_bucket[5m]))
http_latency_p99      = histogram_quantile(0.99,rate(http_request_duration_seconds_bucket[5m]))
